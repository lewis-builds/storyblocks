        { "@type": "Question", "name": "What age is the Story Blocks Journal for?", "acceptedAnswer": { "@type": "Answer", "text": "It's designed for children aged 6 and up (Key Stage 2 & 3) - old enough to write a little independently, young enough to love a sticker reward. Younger children enjoy it too with a grown-up scribing for them." } },
        { "@type": "Question", "name": "What is a daily story starter?", "acceptedAnswer": { "@type": "Answer", "text": "Three words and one friendly question - that's a story starter. Your child weaves the words into a story of their own, on pages made for young writers. There are 70+ of them, across four types: three words, objects, scenarios and first lines." } },
        { "@type": "Question", "name": "Do we have to use it every day?", "acceptedAnswer": { "@type": "Answer", "text": "Not at all. The date pages aren't fixed, so you can dip in whenever suits - a few times a week is plenty to build the habit. The streak chart is there to encourage, never to nag." } },

        { "@type": "Question", "name": "How much is delivery and how long does it take?", "acceptedAnswer": { "@type": "Answer", "text": "UK mainland delivery is free on every order. Orders are dispatched within 1-2 working days and usually arrive within 2-4 working days. Full details are on the delivery & returns page." } },
