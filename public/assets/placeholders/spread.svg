<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 592 420" width="592" height="420" role="img" aria-label="Journal spread photo coming soon">
  <defs>
    <style>
      .cap { font-family: 'Nunito', system-ui, -apple-system, sans-serif; font-weight: 800; }
    </style>
  </defs>
  <!-- pages -->
  <rect x="0" y="0" width="592" height="420" fill="#FFFDF5"/>
  <rect x="0" y="0" width="296" height="420" fill="#FFFDF5"/>
  <rect x="296" y="0" width="296" height="420" fill="#FFFFFF"/>
  <!-- spine shadow -->
  <rect x="276" y="0" width="40" height="420" fill="#231F20" opacity="0.06"/>
  <line x1="296" y1="0" x2="296" y2="420" stroke="#231F20" stroke-opacity="0.14" stroke-width="2"/>
  <!-- left page: a hinted word token + question -->
  <rect x="48" y="70" width="120" height="44" rx="22" fill="#AADFF1" stroke="#231F20" stroke-width="3"/>
  <rect x="180" y="70" width="70" height="44" rx="22" fill="#F59DB2" stroke="#231F20" stroke-width="3"/>
  <line x1="48" y1="164" x2="248" y2="164" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="48" y1="204" x2="248" y2="204" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="48" y1="244" x2="210" y2="244" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <!-- right page: ruled writing lines -->
  <line x1="344" y1="96"  x2="544" y2="96"  stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="344" y1="136" x2="544" y2="136" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="344" y1="176" x2="544" y2="176" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="344" y1="216" x2="512" y2="216" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="344" y1="256" x2="544" y2="256" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <line x1="344" y1="296" x2="480" y2="296" stroke="#231F20" stroke-opacity="0.16" stroke-width="3"/>
  <!-- coming-soon pill -->
  <g transform="translate(296 350)">
    <rect x="-140" y="-22" width="280" height="44" rx="22" fill="#FDCD2A" stroke="#231F20" stroke-width="3"/>
    <text class="cap" x="0" y="6" font-size="19" fill="#231F20" text-anchor="middle">Spread photo coming soon</text>
  </g>
</svg>
