<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="Photo coming soon">
  <defs>
    <style>
      .cap { font-family: 'Nunito', system-ui, -apple-system, sans-serif; font-weight: 800; }
    </style>
  </defs>
  <rect x="0" y="0" width="480" height="360" fill="#DBF0F8"/>
  <!-- dashed frame -->
  <rect x="26" y="26" width="428" height="308" rx="18" fill="none" stroke="#231F20" stroke-opacity="0.30" stroke-width="3" stroke-dasharray="10 10"/>
