<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 104" width="100" height="104" role="img" aria-label="Collector milestone coin">
  <!-- PLACEHOLDER wooden milestone coin. Swap this one file for the real
       artwork (keep the filename) and every coin on the site updates. -->

  <!-- edge / thickness, peeking below the face for a 3D feel -->
  <circle cx="50" cy="56" r="45" fill="#8C5E28" stroke="#231F20" stroke-width="4"/>

  <!-- top face -->
  <circle cx="50" cy="48" r="45" fill="#E3AF5E" stroke="#231F20" stroke-width="4"/>
  <!-- soft highlight -->
  <circle cx="38" cy="34" r="19" fill="#F5D593" opacity="0.5"/>

  <!-- inner ring -->
  <circle cx="50" cy="48" r="34" fill="none" stroke="#231F20" stroke-width="2.5" opacity="0.45"/>

  <!-- wood grain -->
  <path d="M20 38 q30 -9 60 0" fill="none" stroke="#A9772F" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M22 60 q28 9 56 0" fill="none" stroke="#A9772F" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- milestone star -->
  <path d="M50 28 L54.7 41.5 L69 41.8 L57.6 50.5 L61.8 64.2 L50 56 L38.2 64.2 L42.4 50.5 L31 41.8 L45.3 41.5 Z"
        fill="#231F20"/>
</svg>
