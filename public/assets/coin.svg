<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 108" width="100" height="108" role="img" aria-label="Collector milestone coin">
  <!-- PLACEHOLDER wooden milestone coin (shaded for a 3D look). Swap this one
       file for the real artwork (keep the filename) and every coin updates. -->
  <defs>
    <radialGradient id="c-face" cx="0.38" cy="0.30" r="0.9">
      <stop offset="0" stop-color="#EFCE86"/>
      <stop offset="0.48" stop-color="#D3A85B"/>
      <stop offset="0.82" stop-color="#B0803B"/>
      <stop offset="1" stop-color="#8B6027"/>
    </radialGradient>
    <linearGradient id="c-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A9773A"/>
      <stop offset="1" stop-color="#5A3A17"/>
    </linearGradient>
    <linearGradient id="c-bevel" x1="0.08" y1="0.08" x2="0.92" y2="0.92">
      <stop offset="0" stop-color="#F6E0AC"/>
      <stop offset="0.5" stop-color="#C99C54"/>
      <stop offset="1" stop-color="#734C1D"/>
    </linearGradient>
    <radialGradient id="c-field" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0" stop-color="#E0BB78"/>
      <stop offset="1" stop-color="#A9782F"/>
    </radialGradient>
    <filter id="c-soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>

  <!-- edge / thickness peeking below the face -->
  <circle cx="50" cy="55" r="45.5" fill="url(#c-edge)" stroke="#3f2a12" stroke-width="1.5"/>

  <!-- top face -->
  <circle cx="50" cy="49" r="45.5" fill="url(#c-face)" stroke="#4a3216" stroke-width="1.5"/>

  <!-- beveled rim: lit on the top-left, dark on the bottom-right -->
  <circle cx="50" cy="49" r="40.5" fill="none" stroke="url(#c-bevel)" stroke-width="5.5"/>

  <!-- recessed medallion field -->
  <circle cx="50" cy="49" r="36" fill="url(#c-field)"/>
  <circle cx="50" cy="49" r="36" fill="none" stroke="#7c5620" stroke-width="1" opacity="0.5"/>

  <!-- wood grain -->
  <g fill="none" stroke="#9c6c2c" stroke-linecap="round">
    <path d="M20 40 q30 -8 60 2" stroke-width="1.6" opacity="0.32"/>
    <path d="M18 55 q32 10 63 -1" stroke-width="1.6" opacity="0.28"/>
    <path d="M26 66 q24 7 48 0" stroke-width="1.3" opacity="0.24"/>
    <path d="M30 32 q20 -4 40 1" stroke-width="1.2" opacity="0.22"/>
  </g>

  <!-- engraved star: shadow (up-left) + highlight (down-right) + face -->
  <path transform="translate(-0.8,-1)" fill="#3d2913"
        d="M50 30 L54.70 42.53 L68.07 43.13 L57.61 51.47 L61.17 64.37 L50 57 L38.83 64.37 L42.39 51.47 L31.93 43.13 L45.30 42.53 Z"/>
  <path transform="translate(1,1.2)" fill="#EBD199"
        d="M50 30 L54.70 42.53 L68.07 43.13 L57.61 51.47 L61.17 64.37 L50 57 L38.83 64.37 L42.39 51.47 L31.93 43.13 L45.30 42.53 Z"/>
  <path fill="#6d4a22"
        d="M50 30 L54.70 42.53 L68.07 43.13 L57.61 51.47 L61.17 64.37 L50 57 L38.83 64.37 L42.39 51.47 L31.93 43.13 L45.30 42.53 Z"/>

  <!-- soft specular sheen near the top -->
  <ellipse cx="40" cy="28" rx="20" ry="10" fill="#fff8e6" opacity="0.28" filter="url(#c-soft)"/>
</svg>
