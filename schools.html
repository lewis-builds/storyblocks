<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--sb-ink);
    background: var(--sb-cream);
  }
  h1, h2, h3 { margin: 0; }
  p { margin: 0; }
  a { color: inherit; }
  .sb-wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
  .sb-marker { font-family: var(--font-marker); }
  .sb-display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em; }

  @keyframes sb-float { 0%,100% { transform: translateY(0) rotate(var(--r,0deg)); } 50% { transform: translateY(-9px) rotate(var(--r,0deg)); } }
  .sb-float { animation: sb-float 4.5s ease-in-out infinite; }

  a[href^="#"] { text-decoration: none; }

  /* snapshot photo slots */
  .snap { background: #fff; border: 3px solid var(--sb-ink); border-radius: 14px;
    box-shadow: var(--shadow-pop); padding: 12px 12px 14px; }
  .snap figcaption { font-family: var(--font-marker); font-size: 1.1rem; text-align: center; margin-top: 10px; }

  @media (max-width: 820px) { .sb-deco { display: none; } }

  /* ---- responsive ---- */
  @media (max-width: 1024px) {
    .sb-schools-hero { grid-template-columns: 1fr !important; gap: 32px !important; }
    .sb-story { grid-template-columns: 1fr !important; }
    .sb-steps { grid-template-columns: 1fr !important; }
    .sb-snaps { grid-template-columns: 1fr 1fr !important; }
    .sb-nominate { grid-template-columns: 1fr !important; }
    footer .sb-wrap { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 620px) {
    .sb-nav { display: none !important; }
    .sb-snaps { grid-template-columns: 1fr !important; }
    footer .sb-wrap { grid-template-columns: 1fr !important; }
  }
</style>
