<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--sb-cream);
    color: var(--sb-ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; }
  p { margin: 0; }
  a { color: inherit; }
  .sb-wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
  :root { --sec-pad: 108px; }
  .sb-marker { font-family: var(--font-marker); }
  .sb-display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em; }

  /* entrance - transform-only so content is never hidden even if transitions are frozen */
  @media (prefers-reduced-motion: no-preference) {
    .sb-reveal { transform: translateY(20px); transition: transform .55s cubic-bezier(.34,1.56,.64,1); }
    .sb-reveal.in { transform: none; }
  }
  @keyframes sb-float { 0%,100% { transform: translateY(0) rotate(var(--r,0deg)); } 50% { transform: translateY(-9px) rotate(var(--r,0deg)); } }
  .sb-float { animation: sb-float 4.5s ease-in-out infinite; }

  /* ---- Look-inside book (big cover, fit-to-column spread) ---- */
  .look { --book-h: 580px; --cover-w: 416px; --spread-w: 520px;
    perspective: 2600px; position: relative; display: flex; align-items: center; justify-content: center;
    min-height: var(--book-h); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .look__float { position: relative; width: var(--spread-w); max-width: 100%; display: flex; justify-content: center; will-change: transform; }
  @keyframes sb-bookfloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
  @media (prefers-reduced-motion: no-preference) { .look__float { animation: sb-bookfloat 5.5s ease-in-out infinite; } }

  /* the spread revealed on open */
  .look__spread { width: 100%; display: flex; opacity: 0; transform: scale(.9);
    transform-origin: center; transition: opacity .5s ease .18s, transform .65s cubic-bezier(.34,1.4,.5,1) .18s;
    filter: drop-shadow(0 26px 46px rgba(35,31,32,.4)); }
  .look.is-open .look__spread { opacity: 1; transform: none; }
  .look__spread > img { width: 100%; height: auto; display: block; border-radius: 8px; border: 3px solid var(--sb-ink); }
  .look__page { flex: 1; aspect-ratio: 5 / 7; box-sizing: border-box;
    background: var(--sb-cream); border: 3px solid var(--sb-ink); padding: 22px 20px; position: relative; overflow: hidden; }
  .look__page--left  { border-radius: 10px 3px 3px 10px; box-shadow: inset -26px 0 30px -26px rgba(35,31,32,.4); border-right-width: 1.5px; }
  .look__page--right { border-radius: 3px 10px 10px 3px; box-shadow: inset  26px 0 30px -26px rgba(35,31,32,.4); border-left-width: 1.5px; }
  .look__spine { position: absolute; top: 6%; bottom: 6%; left: 50%; width: 4px; transform: translateX(-2px);
    background: linear-gradient(90deg, rgba(35,31,32,.26), rgba(35,31,32,.05)); opacity: 0; transition: opacity .4s ease .18s; z-index: 3; pointer-events: none; }
  .look.is-open .look__spine { opacity: 1; }

  /* the closed cover - big, flips + fades away on open */
  .look__shadow { position: absolute; top: 50%; left: 50%; width: var(--cover-w); height: var(--book-h);
    transform: translate(-50%, -50%); border-radius: 5px 11px 11px 5px; z-index: 1; pointer-events: none;
    box-shadow: 12px 14px 0 0 rgba(35,31,32,.92); transition: opacity .5s ease; }
  .look.is-open .look__shadow { opacity: 0; }
  .look__cover { position: absolute; top: 50%; left: 50%; width: var(--cover-w); height: var(--book-h);
    transform-origin: left center; transform: translate(-50%, -50%) perspective(2600px) rotateY(0deg); opacity: 1;
    transition: transform .95s cubic-bezier(.45,.35,.15,1), opacity .5s ease .3s, box-shadow .95s ease;
    border-radius: 5px 11px 11px 5px; backface-visibility: hidden; z-index: 4; }
  .look.is-open .look__cover { transform: translate(-50%, -50%) perspective(2600px) rotateY(-116deg); opacity: 0; box-shadow: -16px 16px 30px -8px rgba(35,31,32,.35); }
  .look__cover img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: inherit; }

  /* free sticker sheet slotted into the book, poking out the left edge */
  .look__sticker { position: absolute; left: 50%; top: 50%; z-index: 3; padding: 0; border: 0; background: none;
    width: var(--cover-w); height: calc(var(--book-h) * 0.94); transform-origin: center;
    transform: translate(-39%, -50%) rotate(5deg);
    transition: opacity .45s ease, transform .45s ease; pointer-events: none; }
  .look__sticker img { display: block; width: 100%; height: 100%; object-fit: cover; border: 0;
    border-radius: 4px; box-shadow: 6px 8px 16px -4px rgba(35,31,32,.4); background: #fff; }
  .look.is-open .look__sticker { opacity: 0;
    transform: translate(-39%, -50%) rotate(11deg); }

  /* gold edition - periodic tilt-to-the-light with a travelling sheen */
  @media (prefers-reduced-motion: no-preference) {
    .look--gold .look__cover { animation: sb-goldtilt 7s ease-in-out infinite; }
    .look--gold .look__sticker { animation: sb-goldtilt-sticker 7s ease-in-out infinite; }
    .look--gold .look__shadow { animation: sb-goldtilt-shadow 7s ease-in-out infinite; }
    .look--gold .look__sheen { animation: sb-goldsheen 7s ease-in-out infinite; }
  }
  .look__sheen { position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background: linear-gradient(115deg, transparent 41%, rgba(255,255,255,.28) 47%, rgba(255,255,255,.55) 50%, rgba(255,255,255,.28) 53%, transparent 59%) no-repeat;
    background-size: 320% 100%; background-position: 140% 0; }
  @keyframes sb-goldtilt {
    0%, 8%  { transform: translate(-50%, -50%) perspective(2600px) rotateY(0deg) rotateX(0deg); }
    26%, 40% { transform: translate(-50%, -50%) perspective(2600px) rotateY(-28deg) rotateX(8deg); }
    58%, 100% { transform: translate(-50%, -50%) perspective(2600px) rotateY(0deg) rotateX(0deg); }
  }
  @keyframes sb-goldtilt-sticker {
    0%, 8%  { transform: translate(-39%, -50%) perspective(2600px) rotateY(0deg) rotateX(0deg) rotate(5deg); }
    26%, 40% { transform: translate(-39%, -50%) perspective(2600px) rotateY(-28deg) rotateX(8deg) rotate(5deg); }
    58%, 100% { transform: translate(-39%, -50%) perspective(2600px) rotateY(0deg) rotateX(0deg) rotate(5deg); }
  }
  @keyframes sb-goldtilt-shadow {
    0%, 8%  { transform: translate(-50%, -50%) perspective(2600px) rotateY(0deg) rotateX(0deg); }
    26%, 40% { transform: translate(-50%, -50%) perspective(2600px) rotateY(-28deg) rotateX(8deg); }
    58%, 100% { transform: translate(-50%, -50%) perspective(2600px) rotateY(0deg) rotateX(0deg); }
  }
  @keyframes sb-goldsheen {
    0%, 14% { background-position: 140% 0; }
    46%, 100% { background-position: -40% 0; }
  }

  .look__hint { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%) rotate(-2deg);
    background: var(--sb-ink); color: #fff; font-family: var(--font-marker); font-size: 1.1rem;
    padding: 7px 18px; border-radius: 999px; white-space: nowrap; transition: opacity .3s ease; z-index: 6; }
  .look.is-open .look__hint { opacity: 0; }
  .look__rule { border: 0; border-bottom: 2px solid rgba(35,31,32,.16); margin: 0; }
  @media (prefers-reduced-motion: reduce) { .look__spread, .look__cover, .look__spine, .look__sticker { transition: none; } }

  a[href^="#"] { text-decoration: none; }

  @media (max-width: 820px) { .sb-desk-br { display: none; } }

  @media (max-width: 820px) { .sb-deco { display: none; } }

  @media (max-width: 820px) { .sb-problem { grid-template-columns: 1fr !important; gap: 28px !important; } }

  /* ---- what's inside: alternating photo + Q&A rows ---- */
  .snap { background: #fff; border: 3px solid var(--sb-ink); border-radius: 14px;
    box-shadow: var(--shadow-pop); padding: 12px 12px 14px; }
  .snap figcaption { font-family: var(--font-marker); font-size: 1.1rem; text-align: center; margin-top: 10px; }
  .sb-inside-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 72px; align-items: center; }
  .sb-inside-row + .sb-inside-row, .sb-inside-row-wrap + .sb-inside-row-wrap { margin-top: 180px; }
  .sb-inside-row--flip .sb-inside-media { order: 2; }
  @media (max-width: 820px) {
    .sb-inside-row { grid-template-columns: 1fr; gap: 24px; --inside-photo-h: 260px; }
    .sb-inside-row--flip .sb-inside-media { order: 0; }
    .sb-inside-row + .sb-inside-row, .sb-inside-row-wrap + .sb-inside-row-wrap { margin-top: 88px; }
  }

  /* ---- open-book spread rows ---- */
  .sb-spread { position: relative; width: min(900px, 94%); margin: 0 auto; padding: 30px 0 34px; }
  .sb-spread__book { position: relative; border: 3px solid var(--sb-ink); border-radius: 12px;
    background: #fff; box-shadow: var(--shadow-pop-lg); overflow: hidden; transform: rotate(-1deg); }
  .sb-spread--alt .sb-spread__book { transform: rotate(1deg); }
  .sb-spread__spine { position: absolute; top: 0; bottom: 0; left: 50%; width: 44px; transform: translateX(-50%);
    background: linear-gradient(90deg, transparent, rgba(35,31,32,.14) 42%, rgba(35,31,32,.3) 50%, rgba(35,31,32,.14) 58%, transparent);
    pointer-events: none; z-index: 2; }
  .sb-spread__tabs { display: flex; flex-wrap: nowrap; gap: 7px; margin-top: 12px; }
  /* starter row: question card sits to the right of the spread, answer card to the left */
  .sb-spread--starter .sb-spread__note--q { left: auto; right: -30px; transform: rotate(2deg); }
  .sb-spread--starter .sb-spread__note--a { right: auto; left: -30px; transform: rotate(-1.5deg); }
  .sb-spread__note { position: absolute; z-index: 3; background: var(--sb-paper); border: 3px solid var(--sb-ink);
    border-radius: 18px; box-shadow: var(--shadow-pop); padding: 16px 22px; }
  .sb-spread__note--q { top: 0; left: -30px; transform: rotate(-2deg); max-width: 400px; }
  .sb-spread--alt .sb-spread__note--q { left: auto; right: -30px; transform: rotate(2deg); }
  .sb-spread__note--a { bottom: 0; right: -30px; transform: rotate(1.5deg); max-width: 460px; background: var(--sb-wash-lemon); }
  .sb-spread--alt .sb-spread__note--a { right: auto; left: -30px; transform: rotate(-1.5deg); }
  @media (max-width: 820px) {
    .sb-spread { width: 100%; padding: 0; }
    .sb-spread__book { transform: none !important; }
    .sb-spread__tabs { margin-top: 12px; }
    .sb-spread__note { position: static; transform: none !important; max-width: none; margin-top: 14px; }
    .sb-spread__note--q { margin-top: 14px; }
  }

  /* ---- kids photo strip (reviews) ---- */
  .sb-kids-strip { display: flex; justify-content: center; margin-top: 44px; }
  .sb-kids-strip img { width: 100%; max-width: 1080px; height: auto; }
  @media (max-width: 820px) {
    .sb-kids-strip { overflow-x: auto; justify-content: flex-start; margin: 36px -24px 0; padding: 6px 24px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .sb-kids-strip::-webkit-scrollbar { display: none; }
    .sb-kids-strip img { width: auto; max-width: none; height: 180px; flex: 0 0 auto; }
  }

  /* ---- basket drawer ---- */
  .sb-basket-veil { position: fixed; inset: 0; background: rgba(35,31,32,.45); z-index: 80;
    opacity: 0; pointer-events: none; transition: opacity .3s ease; }
  .sb-basket-veil.is-on { opacity: 1; pointer-events: auto; }
  .sb-basket { position: fixed; top: 0; right: 0; bottom: 0; z-index: 81; width: min(420px, 100vw);
    background: var(--sb-cream); border-left: 4px solid var(--sb-ink);
    display: flex; flex-direction: column;
    transform: translateX(105%); transition: transform .4s cubic-bezier(.3,1,.4,1); }
  .sb-basket.is-on { transform: none; }
  @media (prefers-reduced-motion: reduce) { .sb-basket, .sb-basket-veil { transition: none; } }

  /* ---- mobile purchase sheet ---- */
  .sb-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: var(--sb-paper); border-top: 4px solid var(--sb-ink);
    border-radius: 22px 22px 0 0; box-shadow: 0 -10px 26px rgba(35,31,32,.18);
    display: none; padding: 10px 16px calc(14px + env(safe-area-inset-bottom)); }
  .sb-sheet__body { overflow: hidden; max-height: 0; transition: max-height .45s cubic-bezier(.3,1,.4,1); }
  .sb-sheet.is-open .sb-sheet__body { max-height: 460px; }
  @media (prefers-reduced-motion: reduce) { .sb-sheet__body { transition: none; } }

  @media (max-width: 820px) {
    .sb-sheet { display: block; }
    .sb-purchase { display: none; }
    body { padding-bottom: 175px; }
    /* compact hero - fit headline + book + sheet in the first screen */
    #top { --hero-pad: 24px; }
    #top .sb-hero-head .sb-marker { font-size: 1.15rem !important; }
    #top .sb-hero-head h1 { font-size: clamp(1.9rem, 8vw, 2.6rem) !important; }
    #top .sb-hero-head p { font-size: 1.02rem !important; margin-top: 10px !important; }
    .sb-toastwrap { bottom: calc(185px + env(safe-area-inset-bottom)) !important; }
  }

  /* ---- responsive ---- */
  @media (max-width: 1024px) {
    .sb-hero { grid-template-columns: 1fr !important; gap: 28px !important; }
    .sb-inside-showcase { grid-template-columns: 1fr !important; }
    .sb-companion { grid-template-columns: 1fr !important; padding: 28px !important; }
    footer .sb-wrap { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 620px) {
    :root { --sec-pad: 64px; }
    .sb-nav { display: none !important; }
    .sb-scan { flex-wrap: wrap; }
    .sb-scan-char { display: none; }
    .sb-scan-phone { height: 200px !important; margin: -8px auto -30px !important; transform: rotate(3deg) !important; }
    footer .sb-wrap { grid-template-columns: 1fr !important; }
    .look { --book-h: 380px; --cover-w: 272px; --spread-w: 350px; }

    /* trust strip → compact 2×2 grid */
    .sb-trust { display: grid !important; grid-template-columns: 1fr 1fr !important;
      gap: 12px 16px !important; justify-items: start; padding: 14px 20px !important; }
    .sb-trust > div { font-size: .84rem !important; gap: 8px !important; }

    /* reviews → swipeable snap cards */
    .sb-reviews { display: flex !important; overflow-x: auto; scroll-snap-type: x mandatory;
      gap: 16px !important; margin: 32px -24px 0 !important; padding: 6px 24px 18px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .sb-reviews::-webkit-scrollbar { display: none; }
    .sb-reviews > * { flex: 0 0 84%; scroll-snap-align: center; }

    /* room below - handled by the 820px sheet padding */
  }
  @media (max-width: 400px) {
    .look { --book-h: 340px; --cover-w: 244px; --spread-w: 300px; }
  }
